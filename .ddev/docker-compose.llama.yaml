services:
  llama-embed:
    image: ghcr.io/ggml-org/llama.cpp:server
    profiles: ["llama"]
    container_name: ddev-${DDEV_SITENAME:-surfcamp}-llama-embed
    labels:
      com.ddev.site-name: "${DDEV_SITENAME}"
      com.ddev.approot: $DDEV_APPROOT
    command:
      - -hf
      - nomic-ai/nomic-embed-text-v1.5-GGUF
      - --port
      - "8080"
      - --embeddings
      - --pooling
      - mean
      - --ctx-size
      - "2048"
      - --ubatch-size
      - "2048"
      - --host
      - "0.0.0.0"
    volumes:
      - llama-embed-models:/root/.cache/huggingface
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 300s

  llama-generate:
    image: ghcr.io/ggml-org/llama.cpp:server
    profiles: ["llama"]
    container_name: ddev-${DDEV_SITENAME:-surfcamp}-llama-generate
    labels:
      com.ddev.site-name: "${DDEV_SITENAME}"
      com.ddev.approot: $DDEV_APPROOT
    command:
      - -hf
      - ggml-org/gemma-3-4b-it-GGUF
      - --port
      - "8081"
      - --host
      - "0.0.0.0"
    volumes:
      - llama-generate-models:/root/.cache/huggingface
    expose:
      - "8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 600s

volumes:
  llama-embed-models:
  llama-generate-models:
