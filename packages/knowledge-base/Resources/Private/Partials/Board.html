<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

<div class="board module" hidden>
	<div class="board__info">
		<div class="board__info-header">
			<h2 class="board__title" id="board-content-headline">Knowledge Base Board</h2>
			<span class="board__description">Track content creation and updates</span>
		</div>
		<div class="kb-header-actions">
			<button type="button" class="kb-btn-share" id="kb-open-modal">
				<core:icon identifier="tx-knowledge-base-add" size="small" />
				New Task
			</button>
		</div>
	</div>
	<!--Breadcrumb-->
	<f:render partial="Breadcrumb" arguments="{_all}" />

	<!--Board-->
	<div class="board__content">
		<f:render section="Status Column" arguments="{_all}"/>
	</div>

	<div class="kb-create-task-modal-content">
		<div class="kb-create-task-modal-box">
			<f:render partial="CreateTask" />
		</div>
	</div>

	<div class="kb-create-status-modal-content">
		<div class="kb-create-status-modal-box">
			<f:render partial="CreateStatus" arguments="{openDocumentId: openDocumentId}" />
		</div>
	</div>
</div>

<f:section name="Status Column">
	<div class="board__content-container">
		<div class="board__column">
			<div class="board__column--data">
				<h3 class="board__column-title">Add New</h3>
			</div>
			<div class="board__column-content board__column-new t3-grid-cell" id="status-open-modal">
				<span class="add-new-icon">+</span>
			</div>
		</div>
	</div>
</f:section>
