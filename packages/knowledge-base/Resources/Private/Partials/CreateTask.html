<div class="modal t3js-modal modal-type-ajax modal-style-default modal-severity-notice modal-size-small modal-position-center">
	<div class="modal-header t3js-modal-header">
		<h3 class="kb-modal-title">Create New Task</h3>
		<core:icon identifier="tx-knowledge-base-add" size="small" />
	</div>
	<div class="modal-body t3js-modal-body">
		<div class="form-group">
			<label for="task-name" class="form-label">
				<span data-template-property="label">Task name</span>
			</label>
			<div class="form-control-wrap">
				<input
						type="text"
						id="task-name"
						name="taskName"
						value=""
						class="form-control"
						placeholder="Enter task name"
				>
			</div>
		</div>

		<div class="form-group">
			<label for="task-description" class="form-label">
				<span data-template-property="label">Task Description</span>
			</label>
			<div class="form-control-wrap">
		<textarea
				id="task-description"
				name="taskDescription"
				class="form-control"
				placeholder="Enter task description"
		></textarea>
			</div>
		</div>

		<div class="kb-header-actions">
			<button type="button" class="kb-btn-share">
				Cancel
			</button>
			<button type="button" class="kb-btn-share">
				Create Task
			</button>
		</div>
	</div>
</div>
