<f:form action="create" id="kb-creation-form-edit" class="typo3-TCEforms">
	<div class="modal t3js-modal modal-type-ajax modal-style-default modal-severity-notice modal-size-small modal-position-center modal-create-task">
		<div class="modal-header">
			<h3 class="kb-modal-title">Create New Task</h3>
		</div>
		<div class="modal-body t3js-modal-body">

			<div class="form-group">
				<label for="task-name" class="form-label">
					<span data-template-property="label">Task name</span>
				</label>
				<input type="text" name="documentHeadline" class="form-control" id="task-name" placeholder="Task name" />
			</div>

			<div class="form-group">
				<label for="task-description" class="form-label">
					<span data-template-property="label">Task Description</span>
				</label>
				<textarea name="documentDescription" class="form-control" id="task-description"></textarea>
			</div>

			<input type="hidden" name="parentId" value="" />
			<input type="hidden" name="type" value="" />

			<div class="kb-header-actions">
				<button type="button" class="btn btn-default kb-btn-edit kb-btn-close">
					Cancel
				</button>
				<button type="submit" class="btn btn-default kb-btn-edit kb-btn-create">
					Create Task
				</button>
			</div>
		</div>
	</div>
</f:form>
