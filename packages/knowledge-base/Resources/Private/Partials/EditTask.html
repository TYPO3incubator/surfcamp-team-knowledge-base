<f:form action="update" id="kb-edit-form-edit" class="typo3-TCEforms">
	<div class="modal t3js-modal modal-type-ajax modal-style-default modal-severity-notice modal-size-small modal-position-center modal-create-task">

		<div class="modal-header t3js-modal-header">
			<h3 class="kb-modal-title">Edit Task</h3>
		</div>

		<div class="modal-body t3js-modal-body">

			<!-- REQUIRED: document UID -->
			<input type="hidden" name="documentUid" />

			<!-- Headline -->
			<div class="form-group">
				<label for="document-headline" class="form-label">
					Task name
				</label>
				<input
						id="document-headline"
						type="text"
						name="documentData[headline]"
						class="form-control"
						placeholder="Task name"
				/>

			</div>

			<!-- Description -->
			<div class="form-group">
				<label for="document-markup" class="form-label">
					Task Description
				</label>

				<textarea
						id="document-markup"
						name="documentData[markup]"
						class="form-control"
						placeholder="This is the task description"
				></textarea>
			</div>

			<!-- Actions -->
			<div class="kb-header-actions">
				<button type="button" class="btn btn-default kb-btn-edit kb-edit-close">
					Cancel
				</button>
				<button type="submit" class="btn btn-default kb-btn-edit kb-btn-save">
					Update Task
				</button>
			</div>

		</div>
	</div>
</f:form>
