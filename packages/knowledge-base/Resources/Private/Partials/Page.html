<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

<div class="page module">
	<f:for each="{tree}" as="node">
		<f:for each="{node.children}" as="child">

		</f:for>

		<div class="page__info">
			<h2 id="page-content-headline" class="page__title">
				{child.document.headline} (ID: {child.document.uid})
			</h2>
			<div class="kb-header-actions">
				<button type="button" class="kb-btn-edit">
					<core:icon identifier="tx-knowledge-base-edit" size="small" />
					Edit
				</button>
			</div>
		</div>

		<!--Breadcrumb-->
		<f:render partial="Breadcrumb" arguments="{_all}" />

		<div class="page__content t3-page-ce-element">
			<f:if condition="{node.children}">
				<f:for each="{node.children}" as="child">
					<f:format.raw>{child.document.markup}</f:format.raw>
				</f:for>
			</f:if>
		</div>
		<f:render partial="Comment" arguments="{_all}" />
	</f:for>
</div>


</html>
