<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      data-namespace-typo3-fluid="true">

<form class="kb-search-form">
    <div class="kb-search-wrapper">
        <span class="kb-search-icon">
            <core:icon identifier="tx-knowledge-base-search" size="small" />
        </span>
        <input type="text" name="search" placeholder="Search knowledge base" class="form-control form-control-sm search-input tree-search-input kb-search-input" autocomplete="off" />

        <div class="kb-search-flyout">
            <div class="kb-flyout-modes">
                <button type="button" class="kb-flyout-mode-btn is-active" data-mode="keyword">Keyword</button>
                <button type="button" class="kb-flyout-mode-btn" data-mode="semantic">Semantic</button>
                <button type="button" class="kb-flyout-mode-btn" data-mode="rag">RAG</button>
            </div>
            <div class="kb-flyout-status" hidden></div>
            <div class="kb-flyout-results"></div>
        </div>
    </div>
</form>

</html>
