<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Default"/>
<f:layout name="Module"/>

<f:section name="Content">

    <f:render partial="Backend/Search" arguments="{searchUrl: searchUrl, reindexUrl: reindexUrl}"/>

    <details class="kb-tree-details">
        <summary class="kb-tree-summary">Document tree</summary>
        <div class="document-tree">
            <f:render section="Tree" arguments="{tree: tree}"/>
        </div>
    </details>

</f:section>

<f:section name="Tree">
    <f:for each="{tree}" as="node">
        <div class="kb-tree-node">
            <span class="kb-tree-label">— {node.document.headline}</span>
            <span class="kb-tree-uid text-muted">#{node.document.uid}</span>
        </div>
        <f:if condition="{node.children}">
            <div class="kb-tree-children">
                <f:render section="Tree" arguments="{tree: node.children}"/>
            </div>
        </f:if>
    </f:for>
</f:section>

</html>
