<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Default"/>
<f:layout name="Module"/>

<f:section name="Content">
    <h1>Knowledge Base</h1>
    <p>Welcome to the Knowledge Base module.</p>
    <div style="font-family: monospace; white-space: pre-wrap;">
        <f:render section="Tree" arguments="{tree: tree, treeNodes: treeNodes}"/>
    </div>
</f:section>

<f:section name="Tree">
    <f:for each="{tree}" as="node">
        <div><f:for each="{treeNodes}" as="i" iteration="iter"><f:if condition="{iter.index} < {node.depth}">  </f:if></f:for>- {node.name} (ID: {node.identifier})</div>
        <f:if condition="{node.children}">
            <f:render section="Tree" arguments="{tree: node.children, treeNodes: treeNodes}"/>
        </f:if>
    </f:for>
</f:section>

</html>
