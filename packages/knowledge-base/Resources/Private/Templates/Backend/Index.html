<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Default"/>
<f:layout name="Module"/>

<f:section name="Content">
    <h1>Knowledge Base</h1>
    <p>Welcome to the Knowledge Base module.</p>
    <div style="font-family: monospace;" class="document-tree">
        <f:render section="Tree" arguments="{tree: tree}"/>
    </div>
</f:section>

<f:section name="Tree">
    <f:for each="{tree}" as="node">
        <div>- {node.document.headline} (ID: {node.document.uid})</div>
        <f:if condition="{node.children}">
            <f:render section="Tree" arguments="{tree: node.children}"/>
        </f:if>
        <br>
    </f:for>
    <br>
</f:section>

</html>
