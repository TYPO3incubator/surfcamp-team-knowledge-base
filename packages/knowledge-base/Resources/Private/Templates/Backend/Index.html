<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Default"/>
<f:layout name="Module"/>

<f:section name="Content">
    <div class="kb-header">
        <span class="kb-header-title">Knowledge Base</span>

        <form class="kb-search-form">
            <div class="kb-search-wrapper">
                <span class="kb-search-icon">
                    <core:icon identifier="tx-knowledge-base-search" size="small" />
                </span>
                <input type="text" name="search" placeholder="Search knowledge base..." class="kb-search-input" />

                <div class="kb-search-flyout">
                    <a href="#" class="kb-search-result-item">
                        <core:icon identifier="tx-knowledge-base-page" size="small" />
                        <div class="kb-search-result-info">
                            <span class="kb-search-result-title">Getting Started</span>
                            <span class="kb-search-result-path">Documentation</span>
                        </div>
                    </a>
                    <a href="#" class="kb-search-result-item">
                        <core:icon identifier="tx-knowledge-base-page" size="small" />
                        <div class="kb-search-result-info">
                            <span class="kb-search-result-title">Installation</span>
                            <span class="kb-search-result-path">Documentation › Getting Started</span>
                        </div>
                    </a>
                    <a href="#" class="kb-search-result-item">
                        <core:icon identifier="tx-knowledge-base-page" size="small" />
                        <div class="kb-search-result-info">
                            <span class="kb-search-result-title">Configuration Guide</span>
                            <span class="kb-search-result-path">Documentation › Getting Started</span>
                        </div>
                    </a>
                </div>
            </div>
        </form>

        <div class="kb-header-actions">
            <button type="button" class="kb-btn-share">
                <core:icon identifier="tx-knowledge-base-share" size="small" />
                Share
            </button>
        </div>
    </div>

    <div class="document-tree">
        <div class="tree-header">
            <span>Pages</span>
            <button class="basic-button">
                <core:icon identifier="tx-knowledge-base-add" size="default" />
            </button>
        </div>

        <f:render section="Tree" arguments="{tree: tree}"/>
    </div>

</f:section>

<f:section name="Tree">
    <f:for each="{tree}" as="node">
        <div class="item-wrapper">
            <div class="item{f:if(condition: '{node.document.uid} == {openDocumentId}', then: ' is-active')}{f:if(condition: '{node.children}', then: ' has-children')}">
                <f:if condition="{node.children}">
                    <f:then>
                        <button class="basic-button kb-btn-collapse">
                            <core:icon identifier="tx-knowledge-base-collapse" size="small" />
                        </button>
                    </f:then>
                    <f:else>
                        <span class="kb-collapse-placeholder"></span>
                    </f:else>
                </f:if>

                <span class="item-node-icon">
                    <f:if condition="{node.document.type} == 'board'">
                        <f:then>
                            <core:icon identifier="tx-knowledge-base-boards" size="default" />
                        </f:then>
                        <f:else>
                            <core:icon identifier="tx-knowledge-base-page" size="default" />
                        </f:else>
                    </f:if>
                </span>
                <div class="item-text">
                    <span>{node.document.headline} (ID: {node.document.uid})</span>
                    <button class="basic-button">
                        <core:icon identifier="tx-knowledge-base-add" size="default" />
                    </button>
                </div>
            </div>

            <f:if condition="{node.children}">
                <div class="item-childs">
                    <f:render section="Tree" arguments="{tree: node.children}"/>
                </div>
            </f:if>
        </div>
    </f:for>

</f:section>

</html>
