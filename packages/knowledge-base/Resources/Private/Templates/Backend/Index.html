<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Default"/>
<f:layout name="Module"/>

<f:section name="Content">
    <h1>Knowledge Base</h1>
    <p>Welcome to the Knowledge Base module.</p>

    <h2>Create Document</h2>
    <f:form action="create">
        <div>
            <label for="documentHeadline">Headline</label>
            <f:form.textfield name="documentHeadline" id="documentHeadline" />
        </div>
        <div>
            <label for="parentId">Parent</label>
            <f:form.textfield name="parentId" id="parentId" />
        </div>
        <div>
            <label for="type">Visibility</label>
            <f:form.select name="type" id="type" options="{public: 'Page', private: 'Board'}" />
        </div>
        <f:form.submit value="Create" />
    </f:form>

    <h2>Update Document</h2>
    <f:form action="update">
        <div>
            <label for="documentUid">Document</label>
            <f:form.select name="documentUid" id="documentUid" options="{allDocuments}" optionLabelField="headline" optionValueField="uid" prependOptionLabel="-- Select Document --" />
        </div>
        <div>
            <label for="headline">New Headline</label>
            <f:form.textfield name="documentData[headline]" id="headline" />
        </div>
        <div>
            <label for="markup">New Content</label>
            <f:form.textarea name="documentData[markup]" id="markup" rows="5" />
        </div>
        <div>
            <label for="visibility">Visibility</label>
            <f:form.select name="documentData[visibility]" id="visibility" options="{public: 'Public', private: 'Private'}" />
        </div>
        <f:form.submit value="Update" />
    </f:form>

    <div style="font-family: monospace;" class="document-tree">
        <f:render section="Tree" arguments="{tree: tree}"/>
    </div>
</f:section>

<f:section name="Tree">
    <f:for each="{tree}" as="node">
        <div>- {node.document.headline} (ID: {node.document.uid})</div>
        <f:if condition="{node.children}">
            <f:render section="Tree" arguments="{tree: node.children}"/>
        </f:if>
        <br>
    </f:for>
    <br>
</f:section>

</html>
