<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Default"/>
<f:layout name="Module"/>

<f:section name="Content">
    <div class="kb-header">
        <span class="kb-header-title">Knowledge Base</span>

        <f:render partial="Backend/Searchbar" />

        <div class="kb-header-actions">
            <button type="button" class="kb-btn-share">
                <core:icon identifier="tx-knowledge-base-share" size="small" />
                Share
            </button>
        </div>
    </div>

    <div class="kb-container">
        <div class="kb-tree">
            <f:render partial="Backend/Pagetree" arguments="{tree: tree, openDocumentId: openDocumentId}"/>
        </div>

        <div class="kb-content" data-open-document-id="{openDocumentId}" data-open-document-type="{openDocumentType}">
            <f:render partial="Board" arguments="{_all}" />
            <f:render partial="Page" arguments="{_all}" />
        </div>
    </div>

</f:section>
</html>
