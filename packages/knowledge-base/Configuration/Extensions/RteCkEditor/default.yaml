# Load default processing options
imports:
    - { resource: "EXT:rte_ckeditor/Configuration/RTE/Processing.yaml" }
    - { resource: "EXT:rte_ckeditor/Configuration/RTE/Editor/Base.yaml" }

# Add configuration for the editor
# For complete documentation see https://ckeditor.com/docs/ckeditor5/latest/features/index.html
editor:
  config:
    contentsCss:
      - "EXT:rte_ckeditor/Resources/Public/Css/contents.css"

    style:
      definitions:
        - { name: "Intro text", element: "p", classes: [ 'lead' ] }
        - { name: "Small", element: "p", classes: [ 'small' ] }

    heading:
      options:
        - { model: 'paragraph', title: 'Paragraph', class: 'ck-heading_paragraph'  }
        - { model: 'heading2', view: 'h2', title: 'Heading 2', class: 'ck-heading_heading2' }
        - { model: 'heading3', view: 'h3', title: 'Heading 3', class: 'ck-heading_heading3' }
        - { model: 'heading4', view: 'h4', title: 'Heading 4', class: 'ck-heading_heading4' }
        - { model: 'heading5', view: 'h5', title: 'Heading 5', class: 'ck-heading_heading5' }
        - { model: 'heading6', view: 'h6', title: 'Heading 6', class: 'ck-heading_heading6' }

    toolbar:
      items:
        - removeFormat
        - undo
        - redo
        - findAndReplace
        - '|'
        - link
        - unlink
        - '|'
        - selectAll
        - '|'
        - bold
        - italic
        - softhyphen
        - '|'
        - alignment
        - '|'
        - numberedList
        - bulletedList
        - '|'
        - sourceEditing
        - '|'
        - specialCharacters
        - '-'
        - style
        - heading

    alignment:
      options:
        - { name: 'left', className: 'text-start' }
        - { name: 'center', className: 'text-center' }
        - { name: 'right', className: 'text-end' }
        - { name: 'justify', className: 'text-justify' }
