services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  TYPO3Incubator\KnowledgeBase\:
    resource: '../Classes/*'
    exclude:
      - '../Classes/Domain/Model/*'

  TYPO3Incubator\KnowledgeBase\Command\ReIndexDocumentEmbeddingsCommand:
    tags:
      - name: 'console.command'
        command: 'knowledge-base:reindexDocumentEmbeddings'
        schedulable: true